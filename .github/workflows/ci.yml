name: CI Tests

on:
  push:
    branches:
      - main
    paths:
      - "content/Quellcode/shiftplanner/**"
  pull_request:
    paths:
      - "content/Quellcode/shiftplanner/**"
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci
        working-directory: content/Quellcode/shiftplanner

      - name: Run BATS test suite
        run: npm run ci
        working-directory: content/Quellcode/shiftplanner

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-test-reports
          path: content/Quellcode/shiftplanner/test/reports/
          retention-days: 30
