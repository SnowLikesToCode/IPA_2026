# This file contains all sources referenced in the documentation.
# Entries are rendered in the PDF under "Verzeichnisse > Quellenverzeichnis".
#
# Entry Format:
#   - id: unique-identifier
#     titel: "Title of the source"
#     Autor: "Autor name(s)" (optional)
#     jahr: Year of publication (optional)
#     url: "https://..." (optional)
#     url_text: "Visible link text" (optional, defaults to full URL)
#     zugriff: "DD.MM.YYYY" - date accessed (optional, for online sources)
#     typ: website | buch | artikel | dokumentation (optional, default: website)
#     verlag: "Publisher" (optional, for books)
#
# Usage in content:
#   Reference sources by their id. They will appear in the Quellenverzeichnis.
# ============================================================================

